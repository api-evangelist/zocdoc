    name: Zocdoc API
    description: >-
      RESTful API for searching and booking healthcare appointments, managing
      provider availability, handling insurance verification, and integrating
      with Zocdoc's provider network. Supports patient booking flows,
      provider calendar integration, appointment lifecycle management, and
      webhook notifications for real-time updates.
