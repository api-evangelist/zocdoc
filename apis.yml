aid: zocdoc
name: Zocdoc
description: >-
  Zocdoc is a healthcare appointment booking platform that provides a REST API
  for accessing provider availability, booking appointments, managing insurance
  verification, and patient scheduling. The Zocdoc for Developers platform
  enables integration with Zocdoc's provider network through patient booking,
  provider calendar integration, and insurance APIs using OAuth 2.0
  authentication with both sandbox and production environments.
