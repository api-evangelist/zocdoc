  /v1/schedulable_entities:
    get:
      tags:
        - schedulable-entities
      summary: Get schedulable entities
      description: >
        Get the list of schedulable entities within the developer's Zocdoc
        directory (provider-locations, etc.) with availability information.


        NPIs can be used to search for providers in the /v1/providers endpoint
        to facilitate availability, discovery, and booking. Schedulable entity
        ids can be used to find provider-locations in the
        /v1/provider_locations/{provider_location_id} endpoint to facilitate
        availability, discovery, and booking.


        Developers can fetch the schedulable entities list and cache in their
        system. The available schedulable entities do not change frequently.
        Pulling this data once a week and/or after known directory change events
        should be sufficient. However, you may use the `recent_changes_72hrs`
        parameter and the `recent_change_summary` field to get the list of
        entities that have changed in the last 72 hours.
      security:
        - ClientCredentialsFlow:
            - external.schedulable_entity.read
        - AuthorizationCodeFlow:
            - external.schedulable_entity.read
      operationId: getSchedulableEntities
      parameters:
        - name: page
          in: query
          description: >-
            The zero indexed page of results. A mimimum value of 0 will be
            accepted.
          required: false
          schema:
            type: integer
        - name: page_size
          in: query
          description: >-
            The number of results to return per page. The default value is 5000.
            A mimimum value of 1 and a maximum of 10000 will be accepted.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 10000
        - name: schedule_types
          in: query
          description: >-
            The comma-delimited list of schedule types to include. Will return
            all schedule types if not provided.
          required: false
          schema:
            type: string
        - name: recent_changes_72hrs
          in: query
          description: >-
            When true, only includes entities added or updated in the last 72
            hours
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchedulableEntitiesResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
