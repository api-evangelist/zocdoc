openapi: 3.0.0
info:
  version: '1.176'
  title: API Documentation
servers:
  - url: https://api-developer-sandbox.zocdoc.com
    description: Sandbox
  - url: https://api-developer.zocdoc.com
    description: Production
tags:
  - name: reference
    description: Endpoints to retrieve information about the developer's directory.
    x-displayName: NPIs
  - name: schedulable-entities
    description: Endpoints to retrieve schedulable entities with availability information.
    x-displayName: Schedulable entities
  - name: insurance-reference
    description: Endpoints to retrieve insurance plans supported by Zocdoc.
    x-displayName: Insurance
  - name: providers
    description: Endpoints to retrieve providers within the developer's directory.
    x-displayName: Providers
  - name: provider-locations
    description: >-
      Endpoints for retrieving and modifying provider location objects and their
      related insurance plans and availability.
    x-displayName: Provider locations
  - name: facilities
    description: Endpoints to retrieve facilities within the developer's directory.
    x-displayName: Facilities
  - name: calendar-integration-timeslots
    description: Endpoints to manage timeslots for providers.
    x-displayName: Calendar integration timeslots
  - name: appointments
    description: >-
      Endpoints for booking, cancelling, and rescheduling appointments,
      including retrieving current appointment statuses and updated information.
    x-displayName: Appointments
  - name: webhook
    description: Sandbox endpoints to mock webhook behavior
    x-displayName: Webhook
  - name: credentials
    description: Endpoints for managing API credentials.
    x-displayName: Credentials
paths:
  /v1/providers:
    get:
      tags:
        - providers
      summary: Get providers by NPIs
      description: >
        Retrieves specific providers within the developer's directory by NPI
        search. This endpoint searches active providers that are listed on
        Zocdoc. It returns the provider's information (such as name, gender
        identity, specialty), location information and provider location IDs
        which can be used to look up availability and book appointments. Every
        developer has a designated provider directory jointly defined and
        onboarded in partnership with Zocdoc.


        The `provider_location_id` returned in the response can be used to
        retrieve availability in the endpoint
        /v1/provider_locations/availability.
      security:
        - ClientCredentialsFlow: []
        - AuthorizationCodeFlow: []
      operationId: getProviders
      parameters:
        - name: npis
          in: query
          description: >-
            A comma-delimited list of Provider NPI numbers. A maximum of 50
            items will be accepted at a time.
          required: true
          schema:
            type: string
            example: 1234567891,0123456789
        - name: insurance_plan_id
          in: query
          description: >-
            The Zocdoc ID of the patient's insurance plan. Used to determine if
            provider takes patient's insurance in response. Use the [Get
            Insurance Plans](#operation/getInsurancePlans) endpoint to retrieve
            available plans.
          required: false
          schema:
            type: string
            example: ip_2224
        - name: latitude
          in: query
          description: >-
            Latitude of the patient's location. Must be provided together with
            longitude. When provided, response includes distance and nearest
            match for each physical location.
          required: false
          schema:
            type: number
            format: float
            minimum: -90
            maximum: 90
        - name: longitude
          in: query
          description: >-
            Longitude of the patient's location. Must be provided together with
            latitude. When provided, response includes distance and nearest
            match for each physical location.
          required: false
          schema:
            type: number
            format: float
            minimum: -180
            maximum: 180
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderResult'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /v1/provider_locations:
    get:
      tags:
        - provider-locations
      summary: Get provider locations
      description: >
        This endpoint accepts parameters such as zip code, specialty, visit
        reason and accepted insurance to return a filtered set of providers
        within the developer's directory. The response includes additional
        information about the provider location objects returned.


        The `provider_location_id` returned in the response can be used to
        retrieve availability in the endpoint
        /v1/provider_locations/availability.
      security:
        - ClientCredentialsFlow: []
        - AuthorizationCodeFlow: []
      operationId: getProviderLocations
      parameters:
        - name: zip_code
          in: query
          description: A 5 digit zip code.
          required: true
          schema:
            type: string
            example: 36925
        - name: specialty_id
          in: query
          description: >-
            The Zocdoc ID of the provider's specialty. See [Reference
            Data](/guides/reference-data) for options. One of `specialty_id` or
            `visit_reason_id` is required. If `visit_reason_id` is not supplied,
            the default visit reason for the specialty will be used.
          schema:
            type: string
            example: sp_153
        - name: visit_reason_id
          in: query
          description: >-
            The Zocdoc ID for the visit reason. See [Reference
            Data](/guides/reference-data) for options. One of `specialty_id` or
            `visit_reason_id` is required. If both `visit_reason_id` and
            `specialty_id` are supplied, the specialty must be the visit
            reason's corresponding specialty.
          schema:
            type: string
            example: pc_FRO-18leckytNKtruw5dLR
        - name: page
          in: query
          description: The zero indexed page of results.
          schema:
            type: integer
        - name: page_size
          in: query
          description: The number of results to return per page.
          schema:
            type: integer
        - name: insurance_plan_id
          in: query
          description: >-
            The Zocdoc ID of the patient's insurance plan. Use the [Get
            Insurance Plans](#operation/getInsurancePlans) endpoint to retrieve
            available plans.
          required: false
          schema:
            type: string
            example: ip_2224
        - name: visit_type
          in: query
          description: >-
            The type of patient visit with the provider. If not provided, the
            default value is set to `in_person`.
          required: false
          schema:
            $ref: '#/components/schemas/VisitType'
        - name: max_distance_to_patient_mi
          in: query
          description: >-
            The maximum distance in miles from the physical location to the
            search location (the center point of the given `zip_code`). Default
            is 50 miles.
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Succesful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderListResult'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /v1/provider_locations/{provider_location_id}:
    get:
      tags:
        - provider-locations
      summary: Get provider location by id
      description: Get info about a provider location by provider_location_id
      security:
        - ClientCredentialsFlow: []
        - AuthorizationCodeFlow: []
      operationId: getProviderLocation
      parameters:
        - name: provider_location_id
          in: path
          description: The Zocdoc provider location id to get details for.
          required: true
          schema:
            type: string
            example: pr_abc123-def456_wxyz7890|lo_abc123-def456_wxyz7890
        - name: insurance_plan_id
          in: query
          description: >-
            The Zocdoc ID of the patient's insurance plan. Use the [Get
            Insurance Plans](#operation/getInsurancePlans) endpoint to retrieve
            available plans.
          required: false
          schema:
            type: string
            example: ip_2224
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderLocationResult'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '404':
          description: Provider location not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
  /v1/provider_locations/availability:
    get:
      tags:
        - provider-locations
      summary: Get availability for provider locations
      description: >
        Retrieves availability for a set of provider locations. Required
        parameters passed include provider location ids, visit reason id and
        patient type. Visit reason and patient type (new or existing) are used
        to calculate the duration of the appointment and break availability into
        bookable timeslots based on the appointment duration. The response
        output includes the start times of appointments based on these
        calculations.


        The `start_time` returned is used in the endpoint /v1/appointments to
        book appointments.

        If no timeslots are available that satisfy the parameters, an empty
        array will be returned for that Provider Location's timeslots.
      security:
        - ClientCredentialsFlow: []
        - AuthorizationCodeFlow: []
      operationId: getProviderLocationsAvailability
      parameters:
        - name: provider_location_ids
          in: query
          required: true
          description: >-
            A comma-delimited list of Zocdoc `provider_location_ids` retrieved
            from the /v1/providers or /v1/provider_locations endpoint. A maximum
            of 50 items will be accepted at a time.
          schema:
            type: string
            example: >-
              pr_abc123-def456_wxyz7890|lo_abc123-def456_wxyz7890,pr_ghi123-jkl456_mnop7890|lo_ghi123-jkl456_mnop7890
        - name: visit_reason_id
          in: query
          required: true
          description: >-
            The Zocdoc ID of the visit reason. See [Reference
            Data](/guides/reference-data) for options.
          schema:
            type: string
            example: pc_FRO-18leckytNKtruw5dLR
        - name: patient_type
          in: query
          required: true
          description: >-
            New or existing to indicate if the patient is new to the practice or
            has been to the office before.
          schema:
            $ref: '#/components/schemas/PatientType'
        - name: start_date_in_provider_local_time
          in: query
          description: >-
            The first date to retrieve availability for, as YYYY-MM-DD. Defaults
            to current date in US Eastern Time. Can request availability up to a
            maximum of 150 days into the future.
          schema:
            type: string
            format: date
        - name: end_date_in_provider_local_time
          in: query
          description: >-
            The last inclusive date to retrieve availability for, as YYYY-MM-DD.
            Defaults to 7 days after the current date. Must be 31 days or less
            after the start date.
          schema:
            type: string
            format: date
        - name: published_context
          in: query
          description: >-
            Determines how availability slots are returned. Direct_listing
            returns all slots, while condition_driven_search limits results to
            Zocdoc-active providers with budget. Applicable to syndication
            clients.
          required: false
          schema:
            $ref: '#/components/schemas/PublishedContext'
        - name: insurance_plan_id
          in: query
          description: >-
            The Zocdoc ID of the patient's insurance plan. Use the [Get
            Insurance Plans](#operation/getInsurancePlans) endpoint to retrieve
            available plans. Used to construct booking_url.
          required: false
          schema:
            type: string
        - name: insurance_carrier_id
          in: query
          description: >-
            The Zocdoc ID of the patient's insurance carrier. See [Reference
            Data](/guides/reference-data) for options. Used to construct
            booking_url.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityResult'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
  /v1/provider_locations/{provider_location_id}/insurance_mappings:
    get:
      tags:
        - provider-locations
      summary: Get insurance mappings for provider location
      description: >-
        Get eligible insurance plans and insurance mappings for a provider
        location by provider_location_id
      security:
        - ClientCredentialsFlow: []
        - AuthorizationCodeFlow: []
      operationId: getProviderLocationInsuranceMappings
      parameters:
        - name: provider_location_id
          in: path
          description: The Zocdoc provider location id to get insurance plans for.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetInsuranceMappingsResults'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '500':
          description: Internal Server Error
    post:
      tags:
        - provider-locations
      summary: Submit request to update mapped insurance plans
      description: >-
        Submits a request to update mapped insurance plans. This is an
        asynchronous operation and the response indicates the request was
        accepted for processing, not that the update is complete.
      security:
        - ClientCredentialsFlow:
            - external.provider_insurance.write
      operationId: updateProviderLocationInsuranceMappings
      parameters:
        - name: provider_location_id
          in: path
          description: The Zocdoc provider location id to get insurance plans for.
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInsuranceMappingsRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateInsuranceMappingsResult'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '500':
          description: Internal Server Error
  /v1/providers/{provider_id}/reviews:
    get:
      tags:
        - providers
      description: Get review summary for a provider by their Zocdoc provider ID.
      security:
        - ClientCredentialsFlow: []
        - AuthorizationCodeFlow: []
      operationId: getProviderReviews
      parameters:
        - name: provider_id
          in: path
          description: The Zocdoc provider ID.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderReviewsResponse'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Provider not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
      summary: Get Provider Reviews
  /v1/appointments:
    post:
      tags:
        - appointments
      summary: Create appointment
      security:
        - ClientCredentialsFlow:
            - external.appointment.write
        - AuthorizationCodeFlow:
            - external.appointment.write
      operationId: createAppointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookAppointmentRequestBody'
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      description: >
        This endpoint is used for creating new appointments. Developers should
        gather the necessary information to pass in the request body as inputs
        for this endpoint. Only timeslots retrieved from the
        /v1/provider_locations/availability endpoint will be accepted. After an
        /appointments call is successfully processed, the system will return an
        appointment ID.


        The `appointment_id` returned is used in the endpoint
        /v1/appointments/{appointment_id} to track the status of the
        appointment, and in the endpoint /v1/appointments/cancel to cancel an
        appointment.
    get:
      tags:
        - appointments
      summary: Get appointments
      security:
        - ClientCredentialsFlow:
            - external.appointment.read
        - AuthorizationCodeFlow:
            - external.appointment.read
      operationId: getAppointments
      description: >
        This endpoint retrieves the paginated list of appointment details and
        statuses for the given credential. By default, appointments will be
        returned in descending order of start time.


        A maximum of 1,000 total appointments will be returned via pagination;
        if more are expected, use filters and batch requests.


        If the request comes from a Zocdoc user credential, only appointments
        that user has created will be returned. If the request comes from a
        machine-to-machine credential, any appointments that were booked with
        that developer will be returned.
      parameters:
        - name: page
          in: query
          description: >-
            The zero indexed page of results. A mimimum value of 0 and a maximum
            of 10 will be accepted.
          required: false
          schema:
            type: integer
        - name: page_size
          in: query
          description: >-
            The number of results to return per page. A mimimum value of 1 and a
            maximum of 100 will be accepted.
          required: false
          schema:
            type: integer
        - name: statuses
          in: query
          required: false
          description: >-
            A comma-delimited list of Zocodc appointment statuses to filter
            appointments by.
          schema:
            type: string
            example: pending_booking,confirmed
        - name: developer_patient_id
          in: query
          required: false
          description: >-
            The patient identifier provided by 3P developer to filter
            appointments by.
          schema:
            type: string
        - name: sort_by
          in: query
          required: false
          description: The field to sort appointments by. Default is start_time.
          schema:
            $ref: '#/components/schemas/AppointmentSortByType'
        - name: sort_direction
          in: query
          required: false
          description: The direction to sort appointments by. Default is descending.
          schema:
            $ref: '#/components/schemas/AppointmentSortDirectionType'
        - name: practice_ids
          in: query
          required: false
          description: The comma separated values of practice ids to filter appointments by
          schema:
            type: string
            example: pt_abc123-def456_wxyz7890,pt_ghi123-jkl456_mnop7890
        - name: provider_ids
          in: query
          required: false
          description: The comma separated values of provider ids to filter appointments by
          schema:
            type: string
            example: pr_abc123-def456_wxyz7890,pr_ghi123-jkl456_mnop7890
        - name: location_ids
          in: query
          required: false
          description: The comma separated values of location ids to filter appointments by
          schema:
            type: string
            example: lo_abc123-def456_wxyz7890,lo_ghi123-jkl456_mnop7890
        - name: start_time_utc_min
          in: query
          required: false
          description: >-
            The minimum UTC start time of the appointments to fetch. Exclude
            appointments that start before this time.
          schema:
            type: string
            format: instant
            example: '2024-01-01 00:00:00+00:00'
        - name: start_time_utc_max
          in: query
          required: false
          description: >-
            The maximum UTC start time of the appointments to fetch. Exclude
            appointments that start after this time.
          schema:
            type: string
            format: instant
            example: '2024-01-01 00:00:00+00:00'
        - name: created_time_utc_min
          in: query
          required: false
          description: >-
            The minimum UTC created time of the appointments to fetch. Exclude
            appointments that were created before this time.
          schema:
            type: string
            format: instant
            example: '2024-01-01 00:00:00+00:00'
        - name: created_time_utc_max
          in: query
          required: false
          description: >-
            The maximum UTC created time of the appointments to fetch. Exclude
            appointments that were created after this time.
          schema:
            type: string
            format: instant
            example: '2024-01-01 00:00:00+00:00'
        - name: last_modified_time_utc_min
          in: query
          required: false
          description: >-
            The minimum UTC last modified time of the appointments to fetch.
            Exclude appointments that were last modified before this time.
          schema:
            type: string
            format: instant
            example: '2024-01-01 00:00:00+00:00'
        - name: last_modified_time_utc_max
          in: query
          required: false
          description: >-
            The maximum UTC last modified time of the appointments to fetch.
            Exclude appointments that were last modified after this time.
          schema:
            type: string
            format: instant
            example: '2024-01-01 00:00:00+00:00'
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentStatusListResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /v1/appointments/{appointment_id}:
    get:
      tags:
        - appointments
      summary: Get appointment by id
      security:
        - ClientCredentialsFlow:
            - external.appointment.read
        - AuthorizationCodeFlow:
            - external.appointment.read
      operationId: getAppointment
      parameters:
        - name: appointment_id
          in: path
          required: true
          description: The Zocdoc ID for the appointment.
          schema:
            type: string
            example: d04b049a-41b1-4aba-9268-d8973cf72cdd
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentStatusResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
      description: >
        This endpoint retrieves updated appointment details and the status of a
        single existing appointment. Developers must send a valid
        `appointment_id` as input in the request body, and Zocdoc returns the
        appointment details and status for that appointment. See [Appointment
        Status definitions](/guides/glossary).


        If the appointment was booked with a Zocdoc user credential, only that
        user will have access to view or modify the appointment. If the
        appointment was booked with a machine-to-machine credential, the
        appointment can be viewed and modified by any of the developer's
        machine-to-machine credentials.
  /v1/appointments/{appointment_id}/participants:
    get:
      tags:
        - appointments
      summary: Get participants for appointment
      security:
        - ClientCredentialsFlow:
            - external.appointment.read
        - AuthorizationCodeFlow:
            - external.appointment.read
      operationId: getAppointmentParticipants
      parameters:
        - name: appointment_id
          in: path
          required: true
          description: The Zocdoc id of the appointment
          schema:
            type: string
            example: d04b049a-41b1-4aba-9268-d8973cf72cdd
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentParticipantsResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
      description: >
        This endpoint retrieves the participants of an appointment. Developers
        must provide a valid `appointment_id` as a path parameter, and Zocdoc
        returns the participants of that appointment.
  /v1/appointments/cancel:
    post:
      tags:
        - appointments
      summary: Cancel appointment
      security:
        - ClientCredentialsFlow:
            - external.appointment.write
        - AuthorizationCodeFlow:
            - external.appointment.write
      operationId: cancelAppointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelAppointmentRequestBody'
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentBaseResponse'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
      description: >
        This endpoint is used to request the cancellation of an appointment in a
        non-cancelled status. (Non-cancelled statuses include: pending_booking,
        booking_failed, confirmed, pending_reschedule, reschedule_failed and
        rescheduled)


        Developers must send a valid `appointment_id` as input in the request
        body and may choose to pass a cancellation reason using the standardized
        `cancellation_reason_type` field. The optional `cancellation_reason`
        field should only be used when the cancellation reason type is
        'other_patient_reason' or 'other_provider_reason' to provide additional
        context.


        If the appointment was booked with a Zocdoc user credential, only that
        user will have access to view or modify the appointment. If the
        appointment was booked with a machine-to-machine credential, the
        appointment can be viewed and modified by any of the developer's
        machine-to-machine credentials.
  /v1/appointments/confirm:
    post:
      tags:
        - appointments
      summary: Confirm appointment
      security:
        - ClientCredentialsFlow:
            - external.appointment.write
        - AuthorizationCodeFlow:
            - external.appointment.write
      operationId: confirmAppointment
      requestBody:
        required: true
