    CalendarIntegrationTimeslotWeb:
      description: A bookable appointment start time for a particular provider
      type: object
      required:
        - timeslot_id
        - created_utc
      properties:
        provider_id:
          type: string
          description: Provider id
          example: pr_abc123-def456_wxyz7890
        location_id:
          type: string
          description: Location id
          example: lo_abc123-def456_wxyz7890
        start_time:
          type: string
          format: date-time-local
          description: >-
            The local date and time within the timezone. The seconds may be
            omitted.
          example: '2024-09-03T09:30:00'
        time_zone:
          type: string
          description: The IANA time zone id of the timeslot's start time.
          example: America/New_York
        allowed_visit_reason_ids:
          type: array
          description: >
            Restrict the timeslot to these visit reasons. Both `null` and an
            empty array will not restrict the timeslot.


            Can work in conjunction with `excluded_visit_reason_ids`.
            `allowed_visit_reason_ids` are superceded by
            `excluded_visit_reason_ids`.

            So if a visit reason is included in both `allowed_visit_reason_ids`
            and `excluded_visit_reason_ids`, the net effect is that visit reason

            being excluded.


            | allowed | excluded | => Result |

            | -----   | -------- | --------- |

            | null    | null     | all visit reasons allowed |

            | [A,B]   | null     | only A & B are allowed |

            | null    | [A,B]    | all visit reasons except A & B are allowed |

            | [A,B]   | [B,C]    | only A is allowed (C is irrelevant) |

            | [A,B]   | [A,B]    | No visit reasons allowed, unbookable timeslot
            |
          items:
            type: string
          example:
            - pc_FRO-18leckytNKtruw5dLR
        excluded_visit_reason_ids:
          type: array
          items:
            type: string
          example:
            - pc_TlZW-r06U0W3pCsIGtSI5B
          description: >
            Exclude these visit reasons. Both `null` and an empty array means no
            visit reasons will be excluded.


            Can work in conjunction with `allowed_visit_reason_ids`.
            `allowed_visit_reason_ids` are superceded by
            `excluded_visit_reason_ids`.

            So if a visit reason is included in both `allowed_visit_reason_ids`
            and `excluded_visit_reason_ids`, the net effect is that visit reason

            being excluded.


            | allowed | excluded | => Result |

            | -----   | -------- | --------- |

            | null    | null     | all visit reasons allowed |

            | [A,B]   | null     | only A & B are allowed |

            | null    | [A,B]    | all visit reasons except A & B are allowed |

            | [A,B]   | [B,C]    | only A is allowed (C is irrelevant) |

            | [A,B]   | [A,B]    | No visit reasons allowed, unbookable timeslot
            |
        patient_type:
          $ref: '#/components/schemas/PatientType'
        timeslot_id:
          type: string
          description: Timeslot id
          example: slot:ab123
        created_utc:
          type: string
          format: instant
          description: the time this timeslot was created in Zocdoc's system.
          example: '2024-01-01T09:30:00Z'
    TimeslotListResponse:
      allOf:
        - $ref: '#/components/schemas/IteratedBaseResult'
        - type: object
          description: A list of timeslots.
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/CalendarIntegrationTimeslotWeb'
