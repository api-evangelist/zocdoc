        '403':
          description: Forbidden
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
      description: >
        This endpoint is used to only modify the appointment time and request
        the reschedule of an appointment in pending_booking, confirmed,
        pending_reschedule, or rescheduled status. Developers must send a valid
        `appointment_id` and a new start time as input in the request body.


        If the appointment was booked with a Zocdoc user credential, only that
        user will have access to view or modify the appointment. If the
        appointment was booked with a machine-to-machine credential, the
        appointment can be viewed and modified by any of the developer's
        machine-to-machine credentials.
