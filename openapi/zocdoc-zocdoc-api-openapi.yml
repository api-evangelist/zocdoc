                $ref: '#/components/schemas/ErrorResult'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
      description: >
        This endpoint is used to confirm an appointment in pending booking
        status. Developers must send a valid `appointment_id` as input in the
        request body.
  /v1/appointments/reschedule:
    post:
